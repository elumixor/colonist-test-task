<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Colonist — Checkered CTA A/B Variant</title>
    <meta
      name="description"
      content="A/B test variant: checkered primary/secondary CTA layout for the Colonist.io homepage."
    />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="cta-slot" aria-label="Colonist call-to-action buttons">
      <div class="cta-grid">
        <button
          type="button"
          class="cta cta--primary"
          data-cta="primary"
          aria-label="Quick play — jump into a game instantly"
        >
          <span class="cta__title">QUICK PLAY</span>
          <span class="cta__subtitle">Jump into a game instantly</span>
        </button>

        <button
          type="button"
          class="cta cta--secondary"
          data-cta="secondary"
          aria-label="See the leaderboards"
        >
          <span class="cta__title">LEADERBOARDS</span>
          <span class="cta__subtitle">See who's topping the charts</span>
        </button>
      </div>

      <p class="cta-slot__status" role="status" aria-live="polite"></p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
