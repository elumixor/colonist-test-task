name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install sass
        run: bun install --frozen-lockfile

      - name: Compile SCSS → CSS
        run: bun run build

      # Stamp the script/link tags with the commit SHA so a new deploy
      # busts every browser's cache for main.js and styles.css. Source
      # HTML stays clean — the version only exists in the deployed copy.
      - name: Cache-bust assets with commit SHA
        run: |
          SHA="${GITHUB_SHA:0:8}"
          sed -i "s|src=\"main\.js\"|src=\"main.js?v=$SHA\"|" submission/index.html
          sed -i "s|href=\"styles\.css\"|href=\"styles.css?v=$SHA\"|" submission/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: submission

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
