<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Colonist — Checkered CTA A/B Variant</title>
    <meta
      name="description"
      content="A/B test variant: checkered primary/secondary CTA layout for the Colonist.io homepage."
    />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!--
      =====================================================================
      Colonist — Checkered CTA A/B Variant
      =====================================================================

      Live repo:   https://github.com/elumixor/colonist-test-task
      Live demo:   https://elumixor.github.io/colonist-test-task/

      Design decisions
      ----------------
      1. Layout = CSS Grid 2x2, primary in cell (1,1), secondary in cell
         (2,2). No absolute positioning, no JS measurement — the empty
         diagonal cells do the work of making this read as "checkered".

      2. Two container-query scopes:
           - Named `slot` on `.cta-slot`: width of the embed → controls
             whether the grid is 2-col (checkered) or 1-col (stacked).
           - Unnamed on each `.cta`: width of the button → controls title
             and subtitle font size, so titles never overflow on tablet
             widths where the slot is wide but each cell is narrow.
         No viewport media queries — a slot of 768 px has nothing to do
         with a phone at 768 px.

      3. Aspect ratio locked at 3.5 (matches the orange reference). Both
         buttons share it; hard requirement from the brief. `white-space:
         nowrap` on the title prevents two-line breaks at tablet widths.

      4. Max width capped at 500 px per the brief. Below ~420 px of slot
         width the grid collapses to a single column so the subtitle
         stays legible.

      5. Typography: "Wicked Mouse" for titles (Colonist's brand display
         face, hot-linked from their CDN with open CORS) and "Vremena
         Grotesk Bold" for body. Flat vertical gradients, no drop shadow.

      Iteration 2 — live data layer (2026-04-29)
      ------------------------------------------
      6. Both CTAs now fetch real Colonist data on load, behind a tiny
         Cloudflare Worker proxy (see /proxy) that adds CORS headers to
         four allowlisted GETs.

      7. Primary CTA — `/api/room-list.json`. We pick a real, joinable
         room with humans already waiting and deep-link straight into it
         on click, instead of dumping the user at the generic `#quickplay`
         queue. The button shows live counts and the seats remaining in
         the room you're about to enter. Falls back to `#quickplay` when
         no joinable rooms exist or the proxy is unreachable.

      8. Secondary CTA — `/api/leaderboards-tabs/`. The upstream is
         geo-personalised: a viewer in Berlin sees "S16 · EU" on the
         button, a viewer in Toronto sees "S16 · NA". The pill makes the
         personalisation visible *before* the click, which is the part
         that's invisible on the current homepage.

      9. Live "pill" badge (top-right of each button) is the audit trail
         for the API integration — it only renders when real data has
         landed, so it doubles as a visible health indicator. Pulsing
         dot is hidden under `prefers-reduced-motion`.
    -->
    <main class="cta-slot" aria-label="Colonist call-to-action buttons">
      <header class="live-bar" aria-live="polite" aria-label="Live activity">
        <span class="live-bar__dot" aria-hidden="true"></span>
        <span class="live-bar__stat">
          <span class="live-bar__num" data-stat="playing">—</span>
          <span class="live-bar__label">in public rooms</span>
        </span>
        <span class="live-bar__sep" aria-hidden="true">·</span>
        <span class="live-bar__stat">
          <span class="live-bar__num" data-stat="rooms">—</span>
          <span class="live-bar__label">rooms waiting</span>
        </span>
        <span class="live-bar__sep" aria-hidden="true">·</span>
        <span class="live-bar__stat live-bar__stat--season" data-stat="season">—</span>
      </header>

      <div class="cta-grid">
        <button
          type="button"
          class="cta cta--primary"
          data-cta="primary"
          aria-label="Quick play — jump straight into a live game"
        >
          <span class="cta__title">QUICK PLAY</span>
          <span class="cta__subtitle">One click, straight into a live game</span>
        </button>

        <button
          type="button"
          class="cta cta--secondary"
          data-cta="secondary"
          aria-haspopup="dialog"
          aria-label="Leaderboards — open the live API response"
        >
          <span class="cta__title">LEADERBOARDS</span>
          <span class="cta__subtitle">See the top players of the season</span>
        </button>
      </div>
    </main>

    <!--
      Click on LEADERBOARDS opens this dialog. JS samples usernames from
      /api/room-list.json + /api/game-list.json, fetches each player's
      public profile via /api/profile/<username>/overview, and ranks them
      by last-100 score. So the modal is "real top players, right now"
      — multiple endpoints stitched together, all served live through
      the proxy.
    -->
    <dialog class="lb-modal" aria-labelledby="lb-modal-title">
      <button type="button" class="lb-modal__close" aria-label="Close">×</button>
      <header class="lb-modal__head">
        <h2 id="lb-modal-title" class="lb-modal__title">Leaderboards · live</h2>
        <p class="lb-modal__source">
          From
          <code>/api/room-list.json</code> +
          <code>/api/game-list.json</code> +
          <code>/api/profile/&lt;user&gt;/overview</code>
        </p>
      </header>
      <section class="lb-modal__season">
        <strong class="lb-modal__season-num">Season —</strong>
        <span class="lb-modal__countdown">—</span>
      </section>
      <section class="lb-modal__scopes">
        <h3 class="lb-modal__scopes-heading">Top players · active right now</h3>
        <p class="lb-modal__hint">
          Sampled from active rooms and games, ranked by points scored
          across their last 100 games.
        </p>
        <ul class="lb-modal__list"></ul>
      </section>
    </dialog>

    <script src="main.js"></script>
  </body>
</html>
