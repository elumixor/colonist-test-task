<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Colonist — Checkered CTA A/B Variant</title>
    <meta
      name="description"
      content="A/B test variant: checkered primary/secondary CTA layout for the Colonist.io homepage."
    />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!--
      =====================================================================
      Colonist — Checkered CTA A/B Variant
      =====================================================================

      Live repo:   https://github.com/elumixor/colonist-test-task
      Live demo:   https://elumixor.github.io/colonist-test-task/

      Design decisions
      ----------------
      1. Layout = CSS Grid 2x2, primary in cell (1,1), secondary in cell
         (2,2). No absolute positioning, no JS measurement — the empty
         diagonal cells do the work of making this read as "checkered".

      2. Two container-query scopes:
           - Named `slot` on `.cta-slot`: width of the embed → controls
             whether the grid is 2-col (checkered) or 1-col (stacked).
           - Unnamed on each `.cta`: width of the button → controls title
             and subtitle font size, so titles never overflow on tablet
             widths where the slot is wide but each cell is narrow.
         No viewport media queries — a slot of 768 px has nothing to do
         with a phone at 768 px.

      3. Aspect ratio locked at 3.5 (matches the orange reference). Both
         buttons share it; hard requirement from the brief. `white-space:
         nowrap` on the title prevents two-line breaks at tablet widths.

      4. Max width capped at 500 px per the brief. Below ~420 px of slot
         width the grid collapses to a single column so the subtitle
         stays legible.

      5. Typography: "Wicked Mouse" for titles (Colonist's brand display
         face, hot-linked from their CDN with open CORS) and "Vremena
         Grotesk Bold" for body. Flat vertical gradients, no drop shadow.

      Iteration 2 — live data layer (2026-04-29)
      ------------------------------------------
      All Colonist API calls go through a tiny Cloudflare Worker (see
      /proxy, ~80 lines) — colonist.io's API doesn't set CORS headers,
      so direct browser fetches from github.io would otherwise be
      blocked. The Worker allowlists four static GETs plus one regex
      route for /api/profile/<username>/overview. Anything else 404s.

      6. Live activity bar (above the CTAs).
         Reads "● X in public rooms · Y rooms waiting · S16 · EU".
         Counts tween smoothly between polls, the pulsing dot doubles as
         a health indicator (only renders when real data has landed).
         Sources: /api/room-list.json + /api/game-list.json (player
         counts), /api/leaderboards-tabs/ (season + geo-personalised
         region label, IP-based at the upstream).

      7. Primary CTA — instead of #quickplay queue.
         Pre-fetches /api/room-list.json, filters for joinable rooms
         with humans already inside, sorts by most-full so the game is
         closest to starting, and deep-links into a specific real room
         on click. Subtitle reads "Joining hill627 · 1/3 · 2 seats
         open" — the destination is visible *before* the click. Falls
         back to #quickplay if no rooms qualify or the proxy is
         unreachable, so the click is never wasted.

      8. Secondary CTA — opens an in-page popup, never redirects.
         A redirect would make the API call invisible: even when it
         worked, the data would be on the destination, not on the page
         being reviewed. Click opens a dialog that stitches three
         endpoints into a real "top players · active right now" panel:
            (a) /api/room-list.json + /api/game-list.json
                  → list of usernames currently in public rooms or
                    playing public games
            (b) /api/profile/<username>/overview  (per username, in
                parallel) → karma, last-100 score, total games, win %
            (c) /api/leaderboards-tabs/  → active season + endDate for
                the live countdown
         Up to 12 usernames sampled, sorted by points-in-last-100-games
         (the closest thing the public profile API has to a ranking
         metric), top 5 shown with stats. Source endpoints are listed
         at the top of the modal so a reviewer can verify exactly where
         the numbers came from.

         Note: there's no public "leaderboard players" JSON endpoint —
         /api/leaderboards/<mode>/<scope> is auth-gated and returns
         invalidRankedMode unauthenticated. Building the equivalent
         from the public profile API + active rooms/games is the
         workaround.

      9. Numbers honesty (no homepage scrape).
         colonist.io's homepage shows ~6,100 online and ~240k games
         today — those values are SSR'd into the homepage HTML as
         window.onlineCount / window.gamesToday and never refreshed in
         the session; there's no JSON endpoint exposing them. Across
         all five main bundles (shared, shared-web, static-vendors,
         vendors, web) and brute-forced /api/ paths, none surface the
         counts. A scrape (60 s edge cache, single regex) would have
         worked but: brittle to homepage HTML changes, outside what
         Colonist publishes. So the bar shows the strict subset that
         the documented JSON APIs do expose, labelled honestly as "in
         public rooms" — every counted player is a real session in a
         public room or game, no estimate.
    -->
    <main class="cta-slot" aria-label="Colonist call-to-action buttons">
      <header class="live-bar" aria-live="polite" aria-label="Live activity">
        <span class="live-bar__dot" aria-hidden="true"></span>
        <span class="live-bar__stat">
          <span class="live-bar__num" data-stat="playing">—</span>
          <span class="live-bar__label">in public rooms</span>
        </span>
        <span class="live-bar__sep" aria-hidden="true">·</span>
        <span class="live-bar__stat">
          <span class="live-bar__num" data-stat="rooms">—</span>
          <span class="live-bar__label">rooms waiting</span>
        </span>
        <span class="live-bar__sep" aria-hidden="true">·</span>
        <span class="live-bar__stat live-bar__stat--season" data-stat="season">—</span>
      </header>

      <div class="cta-grid">
        <button
          type="button"
          class="cta cta--primary"
          data-cta="primary"
          aria-label="Quick play — jump straight into a live game"
        >
          <span class="cta__title">QUICK PLAY</span>
          <span class="cta__subtitle">One click, straight into a live game</span>
        </button>

        <button
          type="button"
          class="cta cta--secondary"
          data-cta="secondary"
          aria-haspopup="dialog"
          aria-label="Leaderboards — open the live API response"
        >
          <span class="cta__title">LEADERBOARDS</span>
          <span class="cta__subtitle">See the top players of the season</span>
        </button>
      </div>
    </main>

    <!--
      Click on LEADERBOARDS opens this dialog. JS samples usernames from
      /api/room-list.json + /api/game-list.json, fetches each player's
      public profile via /api/profile/<username>/overview, and ranks them
      by last-100 score. So the modal is "real top players, right now"
      — multiple endpoints stitched together, all served live through
      the proxy.
    -->
    <dialog class="lb-modal" aria-labelledby="lb-modal-title">
      <button type="button" class="lb-modal__close" aria-label="Close">×</button>
      <header class="lb-modal__head">
        <h2 id="lb-modal-title" class="lb-modal__title">Leaderboards · live</h2>
        <p class="lb-modal__source">
          From
          <code>/api/room-list.json</code> +
          <code>/api/game-list.json</code> +
          <code>/api/profile/&lt;user&gt;/overview</code>
        </p>
      </header>
      <section class="lb-modal__season">
        <strong class="lb-modal__season-num">Season —</strong>
        <span class="lb-modal__countdown">—</span>
      </section>
      <section class="lb-modal__scopes">
        <h3 class="lb-modal__scopes-heading">Top players · active right now</h3>
        <p class="lb-modal__hint">
          Sampled from active rooms and games, ranked by points scored
          across their last 100 games.
        </p>
        <ul class="lb-modal__list"></ul>
      </section>
    </dialog>

    <script src="main.js"></script>
  </body>
</html>
