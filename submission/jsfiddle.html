<!--
  =========================================================================
  Colonist — Checkered CTA A/B Variant
  =========================================================================
  Time spent: ~2 hours (scaffolding + implementation + responsive + deploy
                        + leaderboards-API iteration + review).
  AI usage:   Claude Code (Opus 4.7) was used to scaffold the Vite + TS + SCSS
              project in a GitHub repo with a Pages deploy workflow, iterate
              on the responsive layout, and run Playwright smoke tests on
              multiple viewports. Every design decision below was reviewed
              and approved before commit; the AI did not ship anything I
              wasn't happy to sign my name to.

  Live repo:  https://github.com/elumixor/colonist-test-task
  Live demo:  https://elumixor.github.io/colonist-test-task/

  Design decisions
  ----------------
  1. Layout = CSS Grid 2x2, primary in cell (1,1), secondary in cell (2,2).
     No absolute positioning, no JS measurement. The empty diagonal cells
     do the work of making this read as "checkered".

  2. Two container-query scopes:
       - Named `slot` on `.cta-slot`: width of the embed → controls whether
         the grid is 2-col (checkered) or 1-col (stacked).
       - Unnamed on each `.cta`: width of the button → controls title and
         subtitle font size, so titles never overflow on tablet widths
         where the slot is wide but each cell is narrow.
     No viewport media queries — a slot of 768 px has nothing to do with
     a phone at 768 px.

  3. Aspect-ratio locked at 3.5 (matches the orange reference). Both
     buttons share it; hard requirement from the brief. `white-space:
     nowrap` on the title prevents two-line breaks like "JOIN A / LOBBY".

  4. Max width capped at 500 px per the brief. Below ~420 px of slot
     width the grid collapses to a single column so the subtitle stays
     legible.

  5. Font is Open Sans — matches the Colonist homepage typography.

  6. Primary CTA = same-tab navigation to a quick-play room.

  7. Secondary CTA = fetches the real leaderboards-tabs API
     (https://colonist.io/api/leaderboards-tabs/) with a 2 s abort
     timeout, logs the response to the console, surfaces a short
     summary ("Season N · M boards") on the status line, then
     navigates to /leaderboards. On any failure (CORS, offline,
     timeout) it still navigates — the click is never wasted.

  8. Accessibility: native <button> elements, visible focus ring,
     aria-busy on the in-flight secondary, aria-live status for the
     loading message, and a `prefers-reduced-motion` opt-out.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap"
  rel="stylesheet"
/>

<main class="cta-slot" aria-label="Colonist call-to-action buttons">
  <div class="cta-grid">
    <button
      type="button"
      class="cta cta--primary"
      data-cta="primary"
      aria-label="Quick play — jump into a game instantly"
    >
      <span class="cta__title">QUICK PLAY</span>
      <span class="cta__subtitle">Jump into a game instantly</span>
    </button>

    <button
      type="button"
      class="cta cta--secondary"
      data-cta="secondary"
      aria-label="See the leaderboards"
    >
      <span class="cta__title">LEADERBOARDS</span>
      <span class="cta__subtitle">See who's topping the charts</span>
    </button>
  </div>

  <p class="cta-slot__status" role="status" aria-live="polite"></p>
</main>
